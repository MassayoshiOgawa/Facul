<!DOCTYPE html>
<!--Declara que o documento é do tipo HTML5-->
<html lang="pt-br">
    <head>
        <!--Cabeçalho que contém configurações-->
        <meta charset="UTF-8">
        <!--Define o conjunto de caracteres (acentuação e outros)-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Loja Tech</title>
        <!--Abaixo estamos estilizando os elementos da página-->
        <style> 
        /* CSS interno */
            body{
                background-color: blanchedalmond;
                font-family: Arial, Helvetica, sans-serif;
                margin: 40px;
                font-variant: small-caps;
            }
            /*Estilizamos o título principal*/
            img{
                width: 30%;
                display: block;
                margin: auto;
            }
            h1{
                color: rgb(18, 9, 141);
                font-variant: small-caps;
                font-size: 40px;
            }
            p{
                color: rgb(18, 9, 141);
                font-variant: small-caps;
                font-size: 20px;
            }
            table{
                width: 50%;
                margin: auto;
                border-collapse: collapse;
            }
            td, th{
                border: 1px solid black;
                padding: 10px;
                text-align: center;
            }
            .Titulo{
                color: rgb(18, 9, 141);
                font-variant: small-caps;
                font-size: 30px;
                margin: 40px;
            }
        </style>
    </head>
        <body>
            <!--É o copro da página hTML-->
            <h1 align="center"> Loja Tech: </h1>
            <p align="center">
                Trabalhamos com os melhores produtos de tecnologia do mercado.
                Aqui você encontra qualidade  e os melhores preços.
            </p>
            <img src="geladeira1 (1).png" alt="Produto em destaque" title="Esta é a mensagem que aparece ao passar o mouse na imagem">
            <h1 class="Titulo"> Nossos produtos: </h1>
            <table title="Tabela">
                <tr>
                    <th> Produto </th>
                    <th> Preço </th>
                </tr>
                <tr>
                    <td> Notebook </td>
                    <td> R$ 3.500,00 </td>
                </tr>
                </tr>
                <tr>
                    <td> Smartphone </td>
                    <td> R$ 2.200,00 </td>
                </tr>
                </tr>
                <tr>
                    <td> Headset gamer </td>
                    <td> R$ 450,00 </td>
                </tr>
            </table>
            
        </body>
</html>
