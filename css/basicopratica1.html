<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS - Inline</title>
</head>
<body style="background-color: rgb(173, 173, 212);">

    <h1 style="color: rgb(134, 62, 62); padding:50px"> TAG h1 com Formatação CSS Inline </h1>
    <!-- A propriedade ou ou atributo padding define a distancia entre um elemento em sua  borda, superior, direito, inferior, etc-->
    <p style="color: aliceblue; padding: 50px; font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;"> Agora utilizando Formatação CSS Inline no paragrafo</p>
    
</body>
</html>
